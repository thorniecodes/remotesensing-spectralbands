<button id="dark-toggle" aria-label="Toggle dark mode" aria-pressed="false">Dark mode</button>
<span id="mode-announcement" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;"></span>

<script>
(function () {
  var btn = document.getElementById('dark-toggle');
  var announcement = document.getElementById('mode-announcement');
  var stored = localStorage.getItem('rs-color-scheme');

  if (stored === 'dark') {
    document.body.classList.add('dark-mode');
    document.body.classList.remove('light-mode');
    if (btn) { btn.textContent = 'Light mode'; btn.setAttribute('aria-pressed', 'true'); }
  }

  if (btn) {
    btn.addEventListener('click', function () {
      var isDark = document.body.classList.toggle('dark-mode');
      document.body.classList.toggle('light-mode', !isDark);
      localStorage.setItem('rs-color-scheme', isDark ? 'dark' : 'light');
      btn.textContent = isDark ? 'Light mode' : 'Dark mode';
      btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      if (announcement) { announcement.textContent = isDark ? 'Dark mode enabled' : 'Light mode enabled'; }
    });
  }
})();
</script>
